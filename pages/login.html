<!-- Login Page -->

<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ — MedQuiz KKU 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background: #0f1f4b;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full glass-card rounded-[2rem] p-8 text-center shadow-2xl">
        <!-- Logo -->
        <div class="mb-6">
            <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fa-solid fa-stethoscope text-3xl text-blue-900"></i>
            </div>
            <h1 class="text-white text-2xl font-800 tracking-tight">MedQuiz KKU 2026</h1>
            <p class="text-blue-200 text-sm opacity-70">Staff Internal Management System</p>
        </div>

        <!-- Login Button -->
        <div class="space-y-4">
            <button id="btnLogin" onclick="handleLogin()"
                class="w-full bg-white text-slate-800 font-bold py-3 px-6 rounded-xl flex items-center justify-center gap-3 hover:bg-blue-50 transition-all active:scale-95 shadow-lg">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18">
                Sign in with KKU Mail
            </button>
            <p class="text-[11px] text-blue-300 opacity-60 leading-relaxed">
                กรุณาใช้บัญชี <b class="text-white">@kku.ac.th</b> หรือ <b class="text-white">@kkumail.com</b>
                ในการเข้าสู่ระบบเท่านั้น<br>
                ระบบนี้สงวนสิทธิ์สำหรับคณะทำงาน MedQuiz 2026
            </p>
        </div>

        <!-- Footer -->
        <div class="mt-12 pt-6 border-t border-white/10 text-blue-300/40 text-[10px] uppercase tracking-widest">
            Faculty of Medicine, Khon Kaen University
        </div>
    </div>

    <script type="module">
        import { loginWithKKU } from '../js/auth.js';
        window.handleLogin = async () => {
            const btn = document.getElementById('btnLogin');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> กำลังตรวจสอบ...';
            try {
                await loginWithKKU();
            } catch (e) {
                btn.disabled = false;
                btn.innerHTML = '<img src="..." width="18"> Sign in with KKU Mail';
            }
        };
    </script>
</body>

</html>
